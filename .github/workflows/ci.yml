name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" langgraph langchain-mcp-adapters mcp \
            fastapi uvicorn httpx
      - name: Build demo artifacts
        run: python -m scripts.build_demo_artifacts
      - name: Unit tests + golden-set regression gate
        run: pytest -q
      - name: Golden-set report (artifact)
        run: python -m evals.runner --min-success 0.9 --json evals/out/golden.json
      - name: A/B report (workflow arm; react arm skipped without key)
        run: python -m evals.ab_report --out evals/out/ab_report.md
      - uses: actions/upload-artifact@v4
        with:
          name: eval-reports-py${{ matrix.python-version }}
          path: evals/out/
